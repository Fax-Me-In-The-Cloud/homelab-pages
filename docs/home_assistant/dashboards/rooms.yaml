views:
- title: Living Room
  path: living-room
  icon: mdi:sofa
  type: sections
  max_columns: 3
  sections:
  - type: grid
    title: Lights & scenes
    cards:
    - type: tile
      entity: light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm
      features:
      - type: light-brightness
      name: Living Room 04
    - type: tile
      entity: light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm_2
      features:
      - type: light-brightness
      name: Living Room 06
