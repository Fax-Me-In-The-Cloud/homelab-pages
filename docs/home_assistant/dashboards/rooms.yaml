      entity: light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm_3
      features:
      - type: light-brightness
    - type: tile
      entity: light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm_5
      features:
      - type: light-brightness
    - type: tile
      entity: light.ikea_of_sweden_tradfribulbe27wsglobeopal1055lm
      features:
      - type: light-brightness
      name: Living Room 03
    - type: tile
      entity: light.ikea_of_sweden_tradfri_bulb_e14_ws_globe_470lm
      features:
      - type: light-brightness
      name: Living Room E14
    - type: tile
      entity: light.ikea_of_sweden_tradfri_bulb_e14_cws_globe_806lm
      features:
      - type: light-brightness
      name: Living Room 07
    - type: tile
      entity: light.night_light
      features:
      - type: light-brightness
      name: Night Light
    - type: tile
      entity: scene.scene_living_room_lights_day
      icon: mdi:palette
      tap_action:
        action: perform-action
        perform_action: scene.turn_on
        target:
          entity_id: scene.scene_living_room_lights_day
      name: Daytime
    - type: tile
      entity: scene.living_room_lights
      icon: mdi:palette
      tap_action:
        action: perform-action
        perform_action: scene.turn_on
        target:
          entity_id: scene.living_room_lights
      name: Dark Outside
  - type: grid
    title: Media
    cards:
    - type: media-control
      entity: media_player.living_room
  - type: grid
    title: Sensors & safety
    cards:
    - type: tile
      entity: binary_sensor.motion_sensor_living_room
      name: Motion
    - type: tile
      entity: sensor.night_light_illuminance
      name: Illuminance
    - type: tile
      entity: sensor.smoke_detector_living_room_temperature
      name: Temperature
    - type: tile
      entity: binary_sensor.smoke_detector_living_room_smoke
      name: Smoke
