# Lighting system — central intensity, per-room window ratio, overrides
# Resolves: issue #2 (adaptive lighting) + issue #25 (central intensity +
# overrides + config-as-code).
#
# Import to: /config/packages/lighting.yaml
# Loaded via packages in configuration.yaml:
#     homeassistant:
#       packages: !include_dir_named packages
# Requires the Adaptive Lighting HACS integration. Restart HA after importing.
#
# Model
# -----
# * input_number.light_intensity (0-100 %) is the master target indoor level.
# * Each room has input_number.window_ratio_<room> (0-100 %) = how much of its
#   light comes from windows. Windowless rooms have ratio 0.
# * BRIGHTNESS is daylight-compensated:
#       brightness = light_intensity * (1 - window_ratio * daylight)
#   where daylight = (sun elevation, clamped 0-40 deg) * (sky clarity from
#   weather). So a windowed room dims as real daylight grows; a windowless room
#   (ratio 0) always sits at light_intensity. The "envelope" automation feeds
#   this brightness to each Adaptive Lighting switch (min = max), and AL applies
#   it loop-free and keeps adapting COLOUR TEMPERATURE on its own (warm evenings,
#   cool midday). AL's native brightness curve is intentionally not used (it runs
#   opposite to daylight compensation).
# * MANUAL override pins a windowed room to full light_intensity and pauses AL
#   (Living Room reuses the existing input_boolean.living_room_max_light).

# ---------------------------------------------------------------------------
# Helpers
# ---------------------------------------------------------------------------
input_number:
  light_intensity:
    name: Light Intensity
    icon: mdi:brightness-6
    min: 0
    max: 100
    step: 5
    initial: 80          # code-defined baseline (without this it starts at min=0)
    unit_of_measurement: "%"
    mode: slider

  # Per-room window ratio (share of light from windows). 0 = windowless.
  window_ratio_living_room:
    name: Window Ratio — Living Room
    icon: mdi:window-open-variant
    min: 0
    max: 100
    step: 5
    initial: 80
    unit_of_measurement: "%"
    mode: slider
  window_ratio_office:
    name: Window Ratio — Office
    icon: mdi:window-open-variant
    min: 0
    max: 100
    step: 5
    initial: 60
    unit_of_measurement: "%"
    mode: slider
  window_ratio_johan:
    name: Window Ratio — Johan
    icon: mdi:window-open-variant
    min: 0
    max: 100
    step: 5
    initial: 70
    unit_of_measurement: "%"
    mode: slider
  window_ratio_viktualie:
    name: Window Ratio — Viktualie
    icon: mdi:window-closed-variant
    min: 0
    max: 100
    step: 5
    initial: 0           # windowless pantry
    unit_of_measurement: "%"
    mode: slider
  window_ratio_basement:
    name: Window Ratio — Basement
    icon: mdi:window-closed-variant
    min: 0
    max: 100
    step: 5
    initial: 0           # windowless; Basement brightness is set in automations.yaml
    unit_of_measurement: "%"
    mode: slider

input_boolean:
  # Living Room already has input_boolean.living_room_max_light (existing helper)
  # — it is the Living Room manual override and is reused below.
  light_override_office:
    name: Office Light Override
    icon: mdi:lightbulb-on-outline
  light_override_johan:
    name: Johan Light Override
    icon: mdi:lightbulb-on-outline

# ---------------------------------------------------------------------------
# Adaptive Lighting — colour temperature (brightness is driven by the envelope)
# ---------------------------------------------------------------------------
# min/max_brightness here are placeholders; the envelope automation pins them to
# the daylight-compensated value at runtime. High-latitude summer time-bounds
# shape the colour-temperature schedule (warm late, given the 22:00 sunset).
adaptive_lighting:
  - name: "Living Room"
    lights:
      - light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm
      - light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm_2
      - light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm_3
      - light.ikea_of_sweden_tradfri_bulb_e27_ws_globe_1055lm_5
      - light.ikea_of_sweden_tradfri_bulb_e14_ws_globe_470lm
      - light.ikea_of_sweden_tradfri_bulb_e14_cws_globe_806lm
      - light.ikea_of_sweden_tradfribulbe27wsglobeopal1055lm
      - light.night_light
    min_color_temp: 2200
    max_color_temp: 4000
    min_sunrise_time: "06:00:00"
    max_sunrise_time: "08:00:00"
    min_sunset_time: "20:00:00"
    max_sunset_time: "21:30:00"
    transition: 1
    interval: 90
    take_over_control: true
    detect_non_ha_changes: false
    autoreset_control_seconds: 3600
    separate_turn_on_commands: true
    send_split_delay: 500

  - name: "Office"
    lights:
      - light.office_bulb_01
    min_color_temp: 2200
    max_color_temp: 4000
    min_sunrise_time: "06:00:00"
    max_sunrise_time: "08:00:00"
    min_sunset_time: "20:00:00"
    max_sunset_time: "21:30:00"
    transition: 1
    interval: 90
    take_over_control: true
    autoreset_control_seconds: 3600

  - name: "Johan"
    lights:
      - light.ikea_of_sweden_tradfri_bulb_e27_ww_806lm
      - light.ikea_of_sweden_tradfri_bulb_e27_ww_globe_806lm
      - light.ikea_of_sweden_tradfri_driver_30w
    min_color_temp: 2200
    max_color_temp: 2700        # warm-white bulbs
    min_sunrise_time: "06:30:00"
    max_sunrise_time: "08:00:00"
    min_sunset_time: "19:30:00"
    max_sunset_time: "20:30:00"
    transition: 1
    interval: 90
    take_over_control: true
    autoreset_control_seconds: 3600

  - name: "Viktualie"
    lights:
      - light.kajplats_gu10_ws_575lm
      - light.kajplats_gu10_ws_575lm_2
      - light.kajplats_gu10_ws_575lm_3
      - light.kajplats_gu10_ws_575lm_4
    min_color_temp: 2200
    max_color_temp: 4000
    transition: 1
    interval: 90
    take_over_control: true
    autoreset_control_seconds: 3600

# ---------------------------------------------------------------------------
# Automations
# ---------------------------------------------------------------------------
automation:
  # --- Daylight-compensating brightness envelope ----------------------------
  - id: lighting_daylight_envelope
    alias: "Lighting: daylight-compensating envelope"
    description: >-
      Per room, brightness = light_intensity * (1 - window_ratio * daylight),
      where daylight = clamped sun elevation * sky clarity. Feeds the result to
      each Adaptive Lighting switch (min = max); AL applies it and keeps adapting
      colour temperature. Windowless rooms (ratio 0) stay at light_intensity.
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/15"          # follow the sun through the day
      - platform: state
        entity_id:
          - input_number.light_intensity
          - input_number.window_ratio_living_room
          - input_number.window_ratio_office
          - input_number.window_ratio_johan
          - input_number.window_ratio_viktualie
      - platform: state
        entity_id: weather.forecast_home
      - platform: homeassistant
        event: start
    variables:
      # AL switch -> its window-ratio helper
      rooms:
        switch.adaptive_lighting_living_room: input_number.window_ratio_living_room
        switch.adaptive_lighting_office: input_number.window_ratio_office
        switch.adaptive_lighting_johan: input_number.window_ratio_johan
        switch.adaptive_lighting_viktualie: input_number.window_ratio_viktualie
      weather_factor:
        sunny: 1.0
        clear-night: 1.0
        partlycloudy: 0.7
        cloudy: 0.4
        fog: 0.3
        hail: 0.3
        lightning: 0.4
        lightning-rainy: 0.3
        pouring: 0.25
        rainy: 0.35
        snowy: 0.45
        snowy-rainy: 0.35
        windy: 0.9
        windy-variant: 0.9
        exceptional: 0.6
      sun_elev: "{{ state_attr('sun.sun', 'elevation') | float(0) }}"
      # 0 at/below horizon, 1.0 once the sun is >= 40 deg, scaled by sky clarity
      daylight: >-
        {{ ([[sun_elev / 40.0, 1.0] | min, 0.0] | max)
           * (weather_factor.get(states('weather.forecast_home'), 0.6) | float) }}
      intensity: "{{ states('input_number.light_intensity') | int(80) }}"
    action:
      - repeat:
          for_each: "{{ rooms | dictsort }}"
          sequence:
            - variables:
                sw: "{{ repeat.item[0] }}"
                ratio: "{{ states(repeat.item[1]) | float(0) / 100.0 }}"
                bri: "{{ [ (intensity * (1.0 - ratio * daylight)) | round | int, 1 ] | max }}"
            - service: adaptive_lighting.change_switch_settings
              data:
                entity_id: "{{ sw }}"
                use_defaults: current     # only touch brightness bounds
                min_brightness: "{{ bri }}"
                max_brightness: "{{ bri }}"
            - service: adaptive_lighting.apply
              data:
                entity_id: "{{ sw }}"
                turn_on_lights: false     # adjust only lights already on
                transition: 2

  # --- Manual overrides: windowed rooms -------------------------------------
  # ON  -> pin the room to full light_intensity and pause adaptive control.
  # OFF -> resume the envelope/AL.
  - id: lighting_manual_override
    alias: "Lighting: manual room override"
    description: >-
      While a room's override boolean is on, hold the room at light_intensity and
      stop Adaptive Lighting adapting it; on clear, resume.
    mode: parallel
    trigger:
      - platform: state
        entity_id: input_boolean.living_room_max_light
        id: living_room
      - platform: state
        entity_id: input_boolean.light_override_office
        id: office
      - platform: state
        entity_id: input_boolean.light_override_johan
        id: johan
    variables:
      rooms:
        living_room:
          area: living_room
          al_switch: switch.adaptive_lighting_living_room
        office:
          area: office
          al_switch: switch.adaptive_lighting_office
        johan:
          area: johan_vaerelse
          al_switch: switch.adaptive_lighting_johan
      room: "{{ rooms[trigger.id] }}"
      is_on: "{{ trigger.to_state.state == 'on' }}"
    action:
      - if:
          - condition: template
            value_template: "{{ is_on }}"
        then:
          - service: adaptive_lighting.set_manual_control
            data:
              entity_id: "{{ room.al_switch }}"
              manual_control: true
          - service: light.turn_on
            target:
              area_id: "{{ room.area }}"
            data:
              brightness_pct: "{{ states('input_number.light_intensity') | int(80) }}"
              transition: 1
        else:
          - service: adaptive_lighting.set_manual_control
            data:
              entity_id: "{{ room.al_switch }}"
              manual_control: false
          - service: adaptive_lighting.apply
            data:
              entity_id: "{{ room.al_switch }}"
              turn_on_lights: false
              transition: 2
