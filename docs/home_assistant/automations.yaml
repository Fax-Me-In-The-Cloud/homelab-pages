- id: '1766166479760'
  alias: 'Living Room: Lights: Activate'
  description: ''
  triggers:
  - device_id: 277214dd43787ec797456dfff29eba57
    domain: zha
    type: remote_button_double_press
    subtype: remote_button_double_press
    trigger: device
  - type: motion
    device_id: 1d3f2ec87fdb803d9d96b183c738d599
    entity_id: 783af3dcae901f43ba29ee7adb292dfc
    domain: binary_sensor
    trigger: device
  - trigger: state
    entity_id:
    - input_boolean.tv_mode
    to:
  - trigger: state
    entity_id:
    - input_boolean.sleep_mode
    to:
  - trigger: state
    entity_id:
    - input_boolean.living_room_max_light
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.sleep_mode
        state:
        - 'on'
      sequence:
      - action: light.turn_off
        metadata: {}
        target:
          area_id: living_room
        data: {}
      alias: Sleep Mode
    - conditions:
      - condition: state
        entity_id: input_boolean.living_room_max_light
        state:
        - 'on'
      sequence:
      - action: light.turn_on
        metadata: {}
        target:
          area_id: living_room
        data:
          brightness_pct: '{{ states(''input_number.light_intensity'') | int(80) }}'
        alias: Light 'Turn on MAX' on Living Room
    - conditions:
      - condition: state
        entity_id: input_boolean.tv_mode
        state:
        - 'on'
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.scene_living_room_lights_tv_mode
        data: {}
      alias: TV Mode
    - conditions:
      - condition: state
        entity_id: binary_sensor.daytime
        state:
        - 'off'
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.living_room_lights
        data: {}
      alias: Dark Outside
    - conditions:
      - condition: state
        entity_id: binary_sensor.daytime
        state:
        - 'on'
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.scene_living_room_lights_day
        data: {}
      alias: Daytime
  mode: single
