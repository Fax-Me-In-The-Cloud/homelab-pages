- id: '1765554726112'
  alias: 'Office: No Motion: Turn Off Lights'
  description: Turn off the office light when no motion has been detected an Anders
    is not active on his Macbook Air
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.motion_sensor_office
    for:
      hours: 0
      minutes: 15
      seconds: 0
    from:
    to:
    - 'off'
  conditions:
  - type: is_off
    condition: device
    device_id: 4b1a1245a5fd1ab167bb7f716292a732
    entity_id: bcbe6f5bba3e7fbd552e0cab7a34c0d0
    domain: binary_sensor
  actions:
  - action: light.turn_off
    metadata: {}
    target:
      entity_id: light.office_bulb_01
    data:
      transition: 15
  mode: single
- id: '1765568036105'
  alias: 'Office: Motion Detected: Turn On Lights'
  description: ''
  triggers:
  - type: motion
    device_id: 084aede4bd76d967356e5e2185197652
    entity_id: 92efc034efe899da7a53958a1c75b5b9
    domain: binary_sensor
    trigger: device
  - trigger: state
    entity_id:
    - binary_sensor.daytime
    to:
    - 'on'
  - trigger: state
    entity_id:
    - binary_sensor.daytime
    to:
    - 'off'
  conditions:
  - type: is_motion
    condition: device
    device_id: 084aede4bd76d967356e5e2185197652
    entity_id: 92efc034efe899da7a53958a1c75b5b9
    domain: binary_sensor
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.daytime
        state:
        - 'off'
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.office_lights_dark_outside
        data: {}
      alias: Dark Outside
    - conditions:
      - condition: state
        entity_id: binary_sensor.daytime
        state:
        - 'on'
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.office_lights_daytime
        data: {}
      alias: Daytime
  mode: single
