- id: '1767175282249'
  alias: 'Basement: Lights: Activate'
  description: ''
  triggers:
  - type: motion
    device_id: 4d8b03e2a6cde0deccca1bd92b972b23
    entity_id: 7afc13fee6a66c55ddffe9eff48aaab1
    domain: binary_sensor
    trigger: device
  - type: turned_on
    device_id: 4383674907116f98dd65c3ff49d390f8
    entity_id: ccdb87ebcdb19c39d7fe5e1899de6fde
    domain: switch
    trigger: device
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: time
        after: '23:00:00'
        before: 06:00:00
      sequence:
      - action: light.turn_on
        metadata: {}
        target:
          area_id: basement_01
        data:
          brightness_pct: '{{ ((states(''input_number.light_intensity'') | int(80)) * 0.3) | round | int }}'
        alias: Soft lights
    - conditions: []
      sequence:
      - action: light.turn_on
        metadata: {}
        target:
          area_id: basement_01
        data:
          brightness_pct: '{{ states(''input_number.light_intensity'') | int(80) }}'
      - type: turn_on
        device_id: 4383674907116f98dd65c3ff49d390f8
        entity_id: ccdb87ebcdb19c39d7fe5e1899de6fde
        domain: switch
  mode: single
- id: '1767178944468'
  alias: 'Basement: Lights: Deactivate'
  description: ''
  triggers:
  - type: no_motion
    device_id: 4d8b03e2a6cde0deccca1bd92b972b23
    entity_id: 7afc13fee6a66c55ddffe9eff48aaab1
    domain: binary_sensor
    trigger: device
    for:
      hours: 0
      minutes: 15
      seconds: 0
  - type: turned_off
    device_id: 4383674907116f98dd65c3ff49d390f8
    entity_id: ccdb87ebcdb19c39d7fe5e1899de6fde
    domain: switch
    trigger: device
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: time
        after: '17:00:00'
        before: '19:00:00'
      sequence: []
      alias: Keep lights on in the evening
    default:
    - action: light.turn_off
      metadata: {}
      target:
        area_id: basement_01
      data: {}
    - type: turn_off
      device_id: 4383674907116f98dd65c3ff49d390f8
      entity_id: ccdb87ebcdb19c39d7fe5e1899de6fde
      domain: switch
  mode: single
- id: '1776103580912'
  alias: 'Heatpump: Steering Scheduler'
  description: Runs economic logic every 15 mins or on setting changes
  triggers:
  - minutes: /15
    trigger: time_pattern
  - entity_id: input_number.heatpump_base_temperature
    trigger: state
  - entity_id: input_number.heatpump_boost_value
    trigger: state
  - entity_id: sensor.energi_data_service
    trigger: state
  conditions:
  - condition: template
    value_template: '{{ states(''sensor.energi_data_service'') | is_number }}'
  actions:
  - action: script.hp_economic_logic
  mode: restart
